<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/css/src/output.css" rel="stylesheet">
    <link rel="icon" href="./assets/imgs/appIcon.svg" type="image/svg+xml">

    <title>Login - Denti Clinics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body class="flex-center min-h-screen bg-bgPrimary ">

<div class="col bg-white lg:w-125  lg:h-166.7 lg:gap-12 lg:rounded-xl lg:border-[6px] border-card shadow-sm lg:p-16  md:w-106.5 md:h-149.5 md:gap-2.5 md:p-10.25 md:lg:rounded-2xl  max-sm:w-85.5 max-sm:min-h-141.5 max-sm:gap-8 max-sm:p-8.25 max-sm:justify-center   sm:w-85.5 sm:min-h-141.5 sm:gap-8 sm:p-8.25 sm:justify-center ">

    <div class="col items-center gap-2  text-center">
        <div class=" bg-primary rounded-2xl  mb-4"><img class=" m-6.5  w-6.75 h-6.75" src="./assets/imgs/loginIcon.svg" alt="Denti Clinics Logo"></div>
        <h1 class="text-textPrimary text-[25px] md:text-[30px] font-manrope font-extrabold">Denti Clinics</h1>
        <p class=" text-[8px] md:text-[12px] text-textMuted font-inter font-medium">DOCTOR PORTAL ACCESS</p>
    </div>

    <form class="col gap-6  ">
        
        <div class="col gap-1">
            <label class="input-label" for="email">Email</label>
            <input class=" input-field"
                id="email" type="text" placeholder="username@denti.com">
        </div>

        <div class="col gap-1">
            <div class="flex-between">
                <label class="input-label" for="password">Password</label>
                <a href="#" class="text-[10px] text-forgot uppercase font-inter font-semibold ">Forgot?</a>
            </div>
            <input class=" input-field"
                id="password" type="password" placeholder="••••••••">
        </div>

        <button class="btn-primary " 
                type="submit">Login</button>
        <p class="text-center font-inter font-medium text-textMuted text-[10px]" > SECURE ENCRYPTED CLINICAL GATEWAY</p>
    </form>

</div>

</body>
</html>
