<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/css/src/output.css" rel="stylesheet">
    <title>Login - Denti Clinics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body class="flex items-center justify-center min-h-screen bg-[#faf9f6]">

<div class="col bg-white w-125 h-[667.15px] gap-12 rounded-xl border-[6px] border-[#f5f4f1] shadow-sm p-[64px]">

    <div class="col items-center gap-2  text-center">
        <div class=" bg-[#002147] rounded-2xl   mb-4"><img class=" m-[26px]  w-[27px] h-[27.05px]" src="./assets/imgs/Container.svg" alt="Denti Clinics Logo"></div>
        <h1 class="text-[#000A1E] text-[30px] font-manrope font-extrabold">Denti Clinics</h1>
        <p class="text-[12px] text-[#5A6375] font-inter font-medium">DOCTOR PORTAL ACCESS</p>
    </div>

    <form class="col gap-6  ">
        
        <div class="col gap-1">
            <label class="text-[12px] text-[#000A1E] uppercase  font-inter font-semibold" for="email">Email</label>
            <input class=" border-b border-[#000A1E] px-0 py-2.5 text-sm text-[#000A1E] outline-none placeholder:text-[#C4C6CF]"
                id="email" type="text" placeholder="username@denti.com">
        </div>

        <div class="col gap-1">
            <div class="flex  gap-60.25 items-center">
                <label class="text-[12px]   text-[#000A1E] uppercase  font-inter font-semibold" for="password">Password</label>
                <a href="#" class="text-[10px] text-[#708AB5] uppercase font-inter font-semibold ">Forgot?</a>
            </div>
            <input class=" border-b border-[#000A1E] px-0 py-2.5 text-sm text-[#000A1E] outline-none   placeholder:text-[#C4C6CF]"
                id="password" type="password" placeholder="••••••••">
        </div>

        <button class="mt-10 w-full py-4 px-[161.5px] bg-[#002147] text-white font-inter font-semibold cursor-pointer text-[14px] uppercase rounded-lg "
                type="submit">Login</button>
        <p class="text-center font-inter font-medium text-[#5A6375] text-[10px]" > SECURE ENCRYPTED CLINICAL GATEWAY</p>
    </form>

</div>

</body>
</html>
