<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/css/src/output.css" rel="stylesheet">
    <link rel="icon" href="./assets/imgs/appIcon.svg" type="image/svg+xml">
    <title>Patiens - Denti Clinics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-bgPrimary ">
<div class="page-grid ">
    <header class=" page-header ">
            <div class="row md:gap-4 gap-1.5">
                <div class="logo-container">
                <img class="logo-icon " src="./assets/imgs/LogoIcon.svg" alt="Logo">
                </div> 
                <h1 class="font-manrope text-[18px] font-bold stroke-[#E2E8F0] flex-center">Denti Clinics</h1>
            </div>
            <div class="search-bar">
                <img src="./assets/imgs/searchIcon.svg" alt="Search Icon" class="w-4 h-4">    
                <input class="flex-1 outline-none bg-transparent font-manrope text-[14px]" placeholder="Search patient or record..." />
            </div>
            <div class="row lg:gap-6.5 gap-4">
                <div class="row md:gap-4 items-center justify-center">
                    <button type="button" aria-label="Notifications" class="icon-btn ">
                        <img src="./assets/imgs/alertIcon.svg" alt="Notification Icon" class="w-5 h-5 ">
                    </button>
                    <button type="button" aria-label="Help information" class="icon-btn ">
                        <img src="./assets/imgs/infoIcon.svg" alt="Info Icon" class="w-5 h-5 hidden lg:flex">
                    </button>
                </div>
            <div>
                <button type="button" aria-label="Profile" class="icon-btn ">
                    <img src="./assets/imgs/profileIcon.svg" alt="Profile Icon" class="w-8 h-8 rounded-full">
                </button>
            </div>
            </div>    
        </header>

    <aside class="page-asidebar ">
            <nav class="main-nav ">
                <a href="index.html" class="nav-unselected">
                    <img src="./assets/imgs/nav_icons/dashboard.svg" alt="Dashboard Icon" class="lg:pt-0 nav-icon ">
                    <span class="nav-label-unselected">Dashboard</span>
                </a>
                <a href="#" class="nav-selected">
                    <img src="./assets/imgs/nav_icons/patiensSelected.svg" alt="Patients Icon" class="nav-icon">
                    <span class="nav-label-selected ">Patients</span>
                </a>
                <a href="#" class="nav-unselected">
                    <img src="./assets/imgs/nav_icons/schedule.svg" alt="Schedule Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Schedule</span>
                </a>
                <a href="setting.html" class=" nav-unselected">
                    <img src="./assets/imgs/nav_icons/settings.svg" alt="Settings Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Settings</span>
                </a>
            </nav>
            <nav class="bottom-nav">
                <a href="#" class="bottom-nav-link">
                    <img src="./assets/imgs/nav_icons/help.svg" alt="Help Icon" class="nav-icon">
                    <span class="nav-label-unselected  ">Help</span>
                </a>
                <a href="#" class="bottom-nav-link">
                    <img src="./assets/imgs/nav_icons/signout.svg" alt="Logout Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Logout</span>
                </a>
            </nav>
        </aside>

    <main class="col-span-1 px-6 md:px-10 lg:px-11 py-4 pb-50 bg-bgPrimary 2xl:pr-57.25">
    
    <!-- main Header -->
        <div class="row-between flex-wrap gap-4">
            <div class="col gap-1">
                <h2 class="font-manrope font-bold text-[30px] md:text-[36px] lg:text-[40px] text-textPrimary">Patient Registry</h2>
                <p class="font-inter text-[14px] md:text-[16px] text-greyheader mt-2">View and manage all your registered patients in one place.</p>
            </div>
            <div class="row gap-3 items-center">
                <button class="btn-secondary border border-gray-200 text-textPrimary bg-[#E9E8E5]">
                    Advanced Filters
                </button>
                <button class="btn-secondary bg-primary text-white hidden md:block">
                    Register New Patient
                </button>
                <button class="fixed bottom-20 right-6 w-14 h-14 bg-primary rounded-full flex-center shadow-md hover:opacity-80 transition cursor-pointer md:hidden">
                    <img src="./assets/imgs/patientsPageIcon/addPatientIcon.svg" class="w-6 h-6">
                </button>
            </div>
        </div>

    <!-- filter -->
        <div class="flex gap-2 my-8 overflow-x-auto pb-8 md:bg-[#F4F3F1] md:borde  md:rounded-2xl md:p-2 md:w-fit scrollbar-hide">
            <input type="radio" name="filter" id="all" class="hidden peer/all" checked>
            <label for="all" class="filter-tab peer-checked/all:bg-white peer-checked/all:text-textPrimary  peer-checked/all:font-bold">
            All Patients
            </label>

            <input type="radio" name="filter" id="active" class="hidden peer/active">
            <label for="active" class="filter-tab peer-checked/active:bg-white peer-checked/active:text-textPrimary peer-checked/active:font-bold ">
            Active Treatment
            </label>

            <input type="radio" name="filter" id="postop" class="hidden peer/postop">
            <label for="postop" class="filter-tab peer-checked/postop:bg-white peer-checked/postop:text-textPrimary  peer-checked/postop:font-bold">
            Post-Op Care
            </label>

            <input type="radio" name="filter" id="waitlist" class="hidden peer/waitlist">
            <label for="waitlist" class="filter-tab peer-checked/waitlist:bg-white peer-checked/waitlist:text-textPrimary  peer-checked/waitlist:font-bold">
            Waitlist
            </label>

        </div>
    </main>
</div>

</body>
</html>
