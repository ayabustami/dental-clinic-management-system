<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./assets/css/src/output.css" rel="stylesheet">
    <link rel="icon" href="./assets/imgs/appIcon.svg" type="image/svg+xml">
    <title>Schedule - Denti Clinics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>

<body class="bg-bgPrimary ">
<div class="page-grid ">
    <header class=" page-header ">
            <div class="row md:gap-4 gap-1.5">
                <div class="logo-container">
                <img class="logo-icon " src="./assets/imgs/LogoIcon.svg" alt="Logo">
                </div> 
                <h1 class="font-manrope text-[18px] font-bold stroke-[#E2E8F0] flex-center">Denti Clinics</h1>
            </div>
            <div class="search-bar">
                <img src="./assets/imgs/searchIcon.svg" alt="Search Icon" class="w-4 h-4">    
                <input class="flex-1 outline-none bg-transparent font-manrope text-[14px]" placeholder="Search patient or record..." />
            </div>
            <div class="row lg:gap-6.5 gap-4">
                <div class="row md:gap-4 items-center justify-center">
                    <button type="button" aria-label="Notifications" class="icon-btn ">
                        <img src="./assets/imgs/alertIcon.svg" alt="Notification Icon" class="w-5 h-5 ">
                    </button>
                    <button type="button" aria-label="Help information" class="icon-btn ">
                        <img src="./assets/imgs/infoIcon.svg" alt="Info Icon" class="w-5 h-5 hidden lg:flex">
                    </button>
                </div>
            <div>
                <button type="button" aria-label="Profile" class="icon-btn ">
                    <img src="./assets/imgs/profileIcon.svg" alt="Profile Icon" class="w-8 h-8 rounded-full">
                </button>
            </div>
            </div>    
        </header>

    <aside class="page-asidebar ">
            <nav class="main-nav ">
                <a href="./index.html" class="nav-unselected">
                    <img src="./assets/imgs/nav_icons/dashboard.svg" alt="Dashboard Icon" class="lg:pt-0 nav-icon ">
                    <span class="nav-label-unselected">Dashboard</span>
                </a>
                <a href="./patients.html" class="nav-unselected">
                    <img src="./assets/imgs/nav_icons/patiens.svg" alt="Patients Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Patients</span>
                </a>
                <a href="./schedule.html" class="nav-selected">
                    <img src="./assets/imgs/nav_icons/scheduleSelected.svg" alt="Schedule Icon" class="nav-icon">
                    <span class="nav-label-selected ">Schedule</span>
                </a>
                <a href="./setting.html" class=" nav-unselected">
                    <img src="./assets/imgs/nav_icons/settings.svg" alt="Settings Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Settings</span>
                </a>
            </nav>
            <nav class="bottom-nav">
                <a href="./help.html" class="bottom-nav-link">
                    <img src="./assets/imgs/nav_icons/help.svg" alt="Help Icon" class="nav-icon">
                    <span class="nav-label-unselected  ">Help</span>
                </a>
                <a href="./login.html" class="bottom-nav-link">
                    <img src="./assets/imgs/nav_icons/signout.svg" alt="Logout Icon" class="nav-icon">
                    <span class="nav-label-unselected ">Logout</span>
                </a>
            </nav>
        </aside>
    <main class="flex flex-col md:flex-col lg:grid lg:grid-cols-[328px_1fr] lg:h-screen lg:overflow-hidden">
            <div class="md:order-2 lg:order-1 flex flex-col gap-4 px-4 py-5 md:grid md:grid-cols-3 md:gap-13 md:px-4 md:py-4 lg:flex lg:flex-col lg:gap-10 lg:px-6 lg:py-8 bg-white  lg:overflow-y-auto md:fixed bottom-0  lg:static">
                <div class="md:col-span-3 lg:col-span-1 md:fixed bottom-3 right-3  lg:static">
                    <button class="lg:w-full bg-primary hover:bg-textPrimary transition-colors md:rounded-full lg:rounded-2xl">
                        <div class=" row-center gap-2 lg:py-2 lg:px-13 p-3.75">
                            <img src="./assets/imgs/ScheduleIcons/addIcon.svg" alt="Add Icon" class="hidden lg:block w-4 h-4">
                            <img src="./assets/imgs/ScheduleIcons/newAppointment.svg" alt="Add Icon" class="lg:hidden block w-4 h-4">
                            <span class="hidden lg:block text-[#D3F1FF] text-[18px] font-semibold font-manrope ">Quick Book</span>
                        </div>
                    </button>
                </div>
                <div class="md:col-span-1 lg:col-span-1">
                    <div class="flex-between mb-2">
                            <span class="text-[16px]/[24px] font-inter text-greyheader/70 tracking-wide">May 2026</span>
                            <div class="flex gap-0">
                                <button class="paging-btn"> ‹ </button>
                                <button class="paging-btn"> › </button>
                            </div>
                    </div>
                    <div class="grid grid-cols-7">
                        <div class="calendar-header">S</div>
                        <div class="calendar-header">M</div>
                        <div class="calendar-header">T</div>
                        <div class="calendar-header">W</div>
                        <div class="calendar-header">T</div>
                        <div class="calendar-header">F</div>
                        <div class="calendar-header">S</div>

                        <div class="calendar-muted-day">27</div>
                        <div class="calendar-muted-day">28</div>
                        <div class="calendar-muted-day">29</div>
                        <div class="calendar-muted-day">30</div>
                        <div class="calendar-day">1</div>
                        <div class="calendar-day">2</div>
                        <div class="calendar-day">3</div>

                        <div class="calendar-day">4</div>
                        <div class="calendar-day">5</div>
                        <div class="calendar-current-day">6</div>
                        <div class="calendar-day">7</div>
                        <div class="calendar-day">8</div>
                        <div class="calendar-day">9</div>
                        <div class="calendar-day">10</div>

                        <div class="calendar-day">11</div>
                        <div class="calendar-day">12</div>
                        <div class="calendar-day">13</div>
                        <div class="calendar-day">14</div>
                        <div class="calendar-day">15</div>
                        <div class="calendar-day">16</div>
                        <div class="calendar-day">17</div>

                        
                    </div>
                </div>
                <div class="w-full md:col-span-1 lg:col-span-1">
                    <div class="section-title">Providers</div>
                        <label class="provider-row">
                            <input type="checkbox"checked >
                            <span class="provider-name ">Dr. Sarah Smith</span>
                            <div class="w-3 h-3 rounded-full bg-blue-600"></div>
                        </label>
                        <label class="provider-row">
                            <input type="checkbox" checked>
                            <span class="provider-name">Dr. Michael Jones</span>
                            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
                        </label>
                        <label class="provider-row">
                            <input type="checkbox" >
                            <span class="provider-name">Dr. Elena Rodriguez</span>
                            <div class="w-3 h-3 rounded-full bg-gray-200"></div>
                        </label>
                </div>
                <div class="w-full md:col-span-1 lg:col-span-1">
                    <div class="section-title">Legend</div>
                    <div class="flex gap-2 pb-1">
                        <div class="w-3 h-3 rounded-sm bg-[#DCFCE7] border border-[#22C55E] shrink-0"></div>
                        <span class="text-[11px] font-inter text-[#0B1C30]">Confirmed</span>
                    </div>
                    <div class="flex gap-2 pb-1">
                        <div class="w-3 h-3 rounded-sm bg-[#FEE2E2] border border-[#EF4444] shrink-0"></div>
                        <span class="text-[11px] font-inter text-[#0B1C30]">Canceled</span>
                    </div>
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-sm bg-[#FFEDD5] border border-[#F97316] shrink-0"></div>
                        <span class="text-[11px] font-inter text-[#0B1C30]">No-show</span>
                    </div>
                </div>
            </div>    
            <div class="order-1 lg:order-2 overflow-auto lg:h-screen">
                DDD
            </div>

        </main>
</div>

</body>
</html>
